  <script>
    (function () {
      var site = window.XFreezeSite;
      var root = document.getElementById('xf-changelog-root');
      if (!site || !root || !site.changelog) return;
      root.innerHTML = site.changelog.map(function (entry) {
        return '<article class="xf-changelog-item"><p class="xf-changelog-date">' + entry.date + '</p><h3>' + entry.title + '</h3><ul>' +
          entry.items.map(function (i) { return '<li>' + i + '</li>'; }).join('') + '</ul></article>';
      }).join('');
    })();
  </script>

  <script>
    function getPreferredTheme() {
      var stored = localStorage.getItem('xfreeze-theme');
      if (stored === 'dark' || stored === 'light') return stored;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    function applyTheme(theme) {
      var isDark = theme === 'dark';
      document.documentElement.classList.toggle('dark', isDark);
      localStorage.setItem('xfreeze-theme', theme);
      document.querySelectorAll('.theme-toggle, .theme-toggle-mobile, .site-nav-drawer-theme__switch').forEach(function (btn) {
        btn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        btn.setAttribute('aria-checked', isDark ? 'true' : 'false');
      });
    }
    function toggleTheme() { applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark'); }
    applyTheme(getPreferredTheme());
  </script>

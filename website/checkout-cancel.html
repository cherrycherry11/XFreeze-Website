<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico?v=share3" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout offline - X Freeze</title>
  <script>
    (function () {
      var stored = localStorage.getItem('xfreeze-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle(
        'dark',
        stored === 'dark' || (stored !== 'light' && prefersDark)
      );
    })();
  </script>
  <link rel="stylesheet" href="css/site-fonts.css">
  <link rel="stylesheet" href="css/theme-dark.css">
  <style>
    body {
      font-family: var(--font-sans, system-ui, sans-serif);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #fff;
      color: #0a0a0a;
    }
    html.dark body { background: #0a0a0a; color: #f2f5f3; }
    .card { max-width: 28rem; text-align: center; }
    h1 { font-size: 1.5rem; margin: 0 0 0.75rem; }
    p { color: #52525b; font-size: 0.9rem; }
    html.dark p { color: #8a958c; }
    a {
      display: inline-flex;
      margin-top: 1.5rem;
      padding: 0.65rem 1.25rem;
      border-radius: 9999px;
      border: 1px solid #e5e7eb;
      color: inherit;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Checkout offline</h1>
    <p>Payments are being rebuilt. No charge was made.</p>
    <a href="pricing">Back to pricing</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-xf-meta-title="Payment result - X Freeze" data-xf-meta-path="checkout-success">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment result - X Freeze</title>
  <script>
    (function () {
      var stored = localStorage.getItem('xfreeze-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle(
        'dark',
        stored === 'dark' || (stored !== 'light' && prefersDark)
      );
    })();
  </script>
  <link rel="stylesheet" href="css/site-fonts.css">
  <link rel="stylesheet" href="css/theme-dark.css">
  <style>
    body {
      font-family: var(--font-sans, system-ui, sans-serif);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: #fff;
      color: #0a0a0a;
    }
    html.dark body { background: #0a0a0a; color: #f2f5f3; }
    .card { max-width: 28rem; width: 100%; text-align: center; }
    h1 { font-size: 1.4rem; margin: 0 0 0.75rem; }
    p { color: #52525b; font-size: 0.9rem; line-height: 1.5; }
    html.dark p { color: #8a958c; }
    .err { color: #dc2626; }
    .ok { color: #15803d; }
    a.btn {
      display: inline-flex;
      margin: 0.35rem;
      padding: 0.65rem 1.15rem;
      border-radius: 9999px;
      border: 1px solid #e5e7eb;
      color: inherit;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Confirming payment…</h1>
    <p id="msg">Please wait while we activate Pro on your account.</p>
    <div id="actions" hidden>
      <a class="btn" href="account">Open Account</a>
      <a class="btn" href="pricing">Pricing</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/entitlement.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var planId = params.get('plan') || '';
      var paymentId =
        params.get('payment_id') ||
        params.get('paymentId') ||
        params.get('status') === 'failed'
          ? null
          : params.get('payment_id');
      var status = (params.get('status') || '').toLowerCase();
      var title = document.getElementById('title');
      var msg = document.getElementById('msg');
      var actions = document.getElementById('actions');

      if (status === 'failed' || status === 'cancelled' || status === 'canceled') {
        title.textContent = 'Payment not completed';
        title.className = 'err';
        msg.textContent =
          'No charge completed (or the card was declined). Pro was not unlocked. You can try again from Pricing.';
        actions.hidden = false;
        return;
      }

      function token() {
        try {
          if (window.XFreezeEntitlement && window.XFreezeEntitlement.getAccessToken) {
            return window.XFreezeEntitlement.getAccessToken() || '';
          }
          if (window.XFreezeAuth && window.XFreezeAuth.getSession) {
            var s = window.XFreezeAuth.getSession();
            return (s && s.access_token) || '';
          }
        } catch (e) {}
        return '';
      }

      function waitAuth(tries) {
        tries = tries || 0;
        var t = token();
        if (t) return Promise.resolve(t);
        if (tries > 25) return Promise.resolve('');
        return new Promise(function (r) {
          setTimeout(function () {
            r(waitAuth(tries + 1));
          }, 200);
        });
      }

      waitAuth().then(function (t) {
        if (!t) {
          title.textContent = 'Sign in required';
          msg.textContent =
            'Sign in with the same account you used at checkout, then open Account.';
          actions.hidden = false;
          return;
        }
        return fetch('/api/verify-payment', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + t,
          },
          body: JSON.stringify({
            planId: planId || undefined,
            payment_id: params.get('payment_id') || params.get('paymentId') || undefined,
          }),
        })
          .then(function (r) {
            return r.json().then(function (data) {
              return { r: r, data: data };
            });
          })
          .then(function (pair) {
            if (pair.data && pair.data.entitlement && window.XFreezeEntitlement) {
              window.XFreezeEntitlement.applyServerEntitlement(pair.data.entitlement);
            }
            if (
              pair.data &&
              (pair.data.granted ||
                pair.data.already ||
                (pair.data.entitlement && pair.data.entitlement.isPro))
            ) {
              title.textContent = 'You are Pro';
              title.className = 'ok';
              msg.textContent = 'Payment confirmed. Your Pro plan is active.';
            } else {
              title.textContent = 'Payment received — activating…';
              msg.textContent =
                (pair.data && pair.data.error) ||
                'If Account still shows Free, stay signed in and refresh in a moment.';
            }
            actions.hidden = false;
          })
          .catch(function (err) {
            title.textContent = 'Could not confirm yet';
            msg.textContent = (err && err.message) || 'Open Account and refresh.';
            actions.hidden = false;
          });
      });
    })();
  </script>
</body>
</html>

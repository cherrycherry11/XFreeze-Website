<!DOCTYPE html>
<html lang="en" data-xf-meta-title="Payment successful - X Freeze" data-xf-meta-desc="Your X Freeze purchase is confirmed." data-xf-meta-path="checkout-success">
<head>
  <link rel="icon" href="/favicon.ico?v=share3" type="image/x-icon">
  <link rel="icon" href="/favicon.png?v=share3" type="image/png" sizes="48x48">
  <link rel="icon" href="/assets/images/logo/favicon-32.png?v=share3" type="image/png" sizes="32x32">
  <link rel="icon" href="/assets/images/logo/favicon-96.png?v=share3" type="image/png" sizes="96x96">
  <link rel="icon" href="/assets/images/logo/favicon-192.png?v=share3" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/assets/images/logo/apple-touch-icon.png?v=share3" sizes="180x180">
  <link rel="manifest" href="/site.webmanifest">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're in - X Freeze</title>
  <script>
    (function () {
      var stored = localStorage.getItem('xfreeze-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle(
        'dark',
        stored === 'dark' || (stored !== 'light' && prefersDark)
      );
    })();
  </script>
  <link rel="stylesheet" href="css/site-fonts.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/theme-dark.css">
  <style>
    :root {
      --text: #0a0a0a;
      --text-secondary: #52525b;
      --border: #e5e7eb;
      --surface: #ffffff;
      --surface-elevated: #fafafa;
      --surface-muted: #f4f4f5;
      --success: #15803d;
      --success-soft: #dcfce7;
    }
    html.dark {
      color-scheme: dark;
      --text: #f5f5f5;
      --text-secondary: #a3a3a3;
      --border: #2a2a2a;
      --surface: #0a0a0a;
      --surface-elevated: #121212;
      --surface-muted: #1c1c1c;
      --success: #4ade80;
      --success-soft: rgba(74, 222, 128, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans, system-ui, -apple-system, sans-serif);
      background: var(--surface);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .xf-success {
      width: 100%;
      max-width: 26rem;
      text-align: center;
    }
    .xf-success-card {
      padding: 2rem 1.5rem 1.75rem;
      border-radius: 1.25rem;
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      box-shadow: 0 24px 48px -28px rgba(0, 0, 0, 0.35);
    }
    html.dark .xf-success-card {
      box-shadow: 0 28px 56px -24px rgba(0, 0, 0, 0.7);
    }
    .xf-success-mark {
      width: 4rem;
      height: 4rem;
      margin: 0 auto 1.25rem;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--success-soft);
      color: var(--success);
      font-size: 1.5rem;
      animation: xf-pop 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes xf-pop {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .xf-success-eyebrow {
      margin: 0 0 0.4rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }
    .xf-success-title {
      margin: 0 0 0.65rem;
      font-size: 1.65rem;
      font-weight: 650;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    .xf-success-lead {
      margin: 0;
      font-size: 0.9375rem;
      line-height: 1.55;
      color: var(--text-secondary);
    }
    .xf-success-plan {
      margin: 1.35rem 0 0;
      padding: 0.9rem 1rem;
      border-radius: 0.9rem;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      text-align: left;
    }
    .xf-success-plan[hidden] { display: none; }
    .xf-success-plan__name {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .xf-success-plan__price {
      font-size: 1.05rem;
      font-weight: 650;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }
    .xf-success-steps {
      margin: 1.35rem 0 0;
      padding: 0;
      list-style: none;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    .xf-success-steps li {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      font-size: 0.8125rem;
      line-height: 1.45;
      color: var(--text-secondary);
    }
    .xf-success-steps i {
      margin-top: 0.15rem;
      color: var(--success);
      font-size: 0.75rem;
      width: 1rem;
      text-align: center;
      flex-shrink: 0;
    }
    .xf-success-actions {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }
    .xf-success-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.85rem;
      padding: 0.7rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }
    .xf-success-btn:hover { opacity: 0.92; }
    .xf-success-btn--primary {
      background: var(--text);
      color: var(--surface);
      border: none;
    }
    html.dark .xf-success-btn--primary {
      background: #f2f5f3;
      color: #020403;
    }
    .xf-success-btn--ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .xf-success-ref {
      margin: 1.25rem 0 0;
      font-size: 0.7rem;
      color: var(--text-secondary);
      opacity: 0.75;
      word-break: break-all;
      line-height: 1.4;
    }
    .xf-success-ref[hidden] { display: none; }
    .xf-success-logo {
      margin-top: 1.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-secondary);
      text-decoration: none;
    }
    .xf-success-logo:hover { color: var(--text); }
    .xf-success-card.is-failed .xf-success-mark {
      background: rgba(239, 68, 68, 0.12);
      color: #ef4444;
    }
    .xf-success-card.is-pending .xf-success-mark {
      background: rgba(234, 179, 8, 0.14);
      color: #ca8a04;
    }
  </style>
</head>
<body>
  <main class="xf-success">
    <div class="xf-success-card" id="success-card">
      <div class="xf-success-mark" id="success-mark" aria-hidden="true">
        <i class="fa-solid fa-spinner fa-spin" id="success-icon"></i>
      </div>
      <p class="xf-success-eyebrow" id="success-eyebrow">Checking payment…</p>
      <h1 class="xf-success-title" id="success-title">One moment</h1>
      <p class="xf-success-lead" id="success-lead">
        Confirming your payment status with Dodo.
      </p>

      <div class="xf-success-plan" id="success-plan" hidden>
        <span class="xf-success-plan__name" id="success-plan-name">Pro</span>
        <span class="xf-success-plan__price" id="success-plan-price"></span>
      </div>

      <ul class="xf-success-steps" id="success-steps" hidden>
        <li>
          <i class="fa-solid fa-check" aria-hidden="true"></i>
          <span>Access templates, motion prompts, and AI skills</span>
        </li>
        <li>
          <i class="fa-solid fa-check" aria-hidden="true"></i>
          <span>Copy prompts into Grok, Claude, Cursor, or GPT</span>
        </li>
        <li>
          <i class="fa-solid fa-check" aria-hidden="true"></i>
          <span>Pro unlocks after the payment is verified</span>
        </li>
      </ul>

      <div class="xf-success-actions" id="success-actions">
        <a class="xf-success-btn xf-success-btn--primary" id="success-primary" href="account">View account</a>
        <a class="xf-success-btn xf-success-btn--ghost" id="success-secondary" href="pricing">Back to pricing</a>
        <a class="xf-success-btn xf-success-btn--ghost" href="skills">Explore skills</a>
      </div>

      <p class="xf-success-ref" id="success-ref" hidden></p>
    </div>
    <a class="xf-success-logo" href="home">X Freeze</a>
  </main>

  <script src="js/auth-config.js"></script>
  <script src="data/products.js"></script>
  <script src="js/entitlement.js"></script>
  <script src="js/usage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      /*
       * Dodo redirects here after checkout with query params, e.g.
       * ?payment_id=pay_…&status=succeeded|failed|processing&plan=pro-monthly
       * Never show "confirmed" for failed payments.
       */
      var params = new URLSearchParams(window.location.search);
      var paymentId = params.get('payment_id') || params.get('paymentId') || '';
      var planId = params.get('plan') || '';
      var statusRaw = (
        params.get('status') ||
        params.get('payment_status') ||
        params.get('paymentStatus') ||
        ''
      ).toLowerCase();

      function isFailedStatus(s) {
        return (
          s === 'failed' ||
          s === 'fail' ||
          s === 'declined' ||
          s === 'cancelled' ||
          s === 'canceled' ||
          s === 'error'
        );
      }
      function isSuccessStatus(s) {
        return (
          s === 'succeeded' ||
          s === 'success' ||
          s === 'paid' ||
          s === 'active' ||
          s === 'completed'
        );
      }

      var product = null;

      function readProduct() {
        try {
          var a = sessionStorage.getItem('xf_pending_product');
          if (a) return JSON.parse(a);
        } catch (e) {}
        try {
          var b = localStorage.getItem('xf_pending_product');
          if (b) return JSON.parse(b);
        } catch (e2) {}
        return null;
      }

      function catalogPlan(id) {
        if (window.XFreezeProducts && window.XFreezeProducts.getSubscription) {
          var p = window.XFreezeProducts.getSubscription(id);
          if (p) return p;
        }
        if (id === 'pro-yearly') {
          return { id: 'pro-yearly', name: 'Pro Yearly', price: 499, type: 'subscription', interval: 'year' };
        }
        if (id === 'pro-monthly') {
          return { id: 'pro-monthly', name: 'Pro Monthly', price: 49, type: 'subscription', interval: 'month' };
        }
        return null;
      }

      function waitAuthReady() {
        return new Promise(function (resolve) {
          var tries = 0;
          (function tick() {
            tries += 1;
            if (
              window.XFreezeAuth &&
              (window.XFreezeAuth.getSession() || tries > 40)
            ) {
              resolve();
              return;
            }
            setTimeout(tick, 80);
          })();
        });
      }

      function setUi(mode, leadText) {
        var card = document.getElementById('success-card');
        var mark = document.getElementById('success-mark');
        var icon = document.getElementById('success-icon');
        var eyebrow = document.getElementById('success-eyebrow');
        var title = document.getElementById('success-title');
        var lead = document.getElementById('success-lead');
        var steps = document.getElementById('success-steps');
        var primary = document.getElementById('success-primary');
        var secondary = document.getElementById('success-secondary');

        card.classList.remove('is-failed', 'is-pending');
        if (mode === 'failed') {
          card.classList.add('is-failed');
          icon.className = 'fa-solid fa-xmark';
          eyebrow.textContent = 'Payment failed';
          title.textContent = 'Payment not completed';
          steps.hidden = true;
          primary.href = 'pricing';
          primary.textContent = 'Try again';
          secondary.href = 'account';
          secondary.textContent = 'View account';
        } else if (mode === 'success') {
          icon.className = 'fa-solid fa-check';
          eyebrow.textContent = 'Payment confirmed';
          title.textContent = "You're all set";
          steps.hidden = false;
          primary.href = 'account';
          primary.textContent = 'View account';
          secondary.href = 'templates';
          secondary.textContent = 'Browse templates';
        } else {
          card.classList.add('is-pending');
          icon.className = 'fa-solid fa-circle-exclamation';
          eyebrow.textContent = 'Almost there';
          title.textContent = 'Payment pending';
          steps.hidden = true;
          primary.href = 'account';
          primary.textContent = 'View account';
          secondary.href = 'pricing';
          secondary.textContent = 'Back to pricing';
        }
        lead.textContent = leadText || '';
      }

      product = readProduct();
      if (!product && planId) product = catalogPlan(planId);

      var plan = document.getElementById('success-plan');
      var planName = document.getElementById('success-plan-name');
      var planPrice = document.getElementById('success-plan-price');
      var ref = document.getElementById('success-ref');

      if (product && product.name) {
        var priceNum = Number(product.price);
        var price = '$' + (Number.isInteger(priceNum) ? priceNum : priceNum.toFixed(2));
        plan.hidden = false;
        planName.textContent = product.name;
        planPrice.textContent = price;
      }

      /* Immediate fail UI if Dodo says failed (real card in test mode, etc.) */
      if (isFailedStatus(statusRaw)) {
        setUi(
          'failed',
          'Your card was declined or the payment did not go through. In Dodo test mode you must use a test card (for example 4242 4242 4242 4242) — real cards are rejected. No charge was made and Pro was not unlocked.'
        );
        if (paymentId) {
          ref.hidden = false;
          ref.textContent = 'Reference: ' + paymentId + (statusRaw ? ' · status: ' + statusRaw : '');
        }
        try {
          sessionStorage.removeItem('xf_pending_product');
          localStorage.removeItem('xf_pending_product');
        } catch (e0) {}
        return;
      }

      waitAuthReady().then(function () {
        function finish(snap, verifyOk) {
          if (snap && snap.isPro) {
            setUi(
              'success',
              'Your Pro plan is active. Open Account anytime to see billing and usage.'
            );
          } else if (isSuccessStatus(statusRaw) || verifyOk) {
            setUi(
              'pending',
              'Payment looks successful, but Pro is not active yet. Wait a few seconds and refresh Account, or contact support with your payment reference.'
            );
          } else if (paymentId) {
            setUi(
              'pending',
              'We could not confirm this payment yet. If you completed checkout, open Account in a minute — or try again with a Dodo test card.'
            );
          } else {
            setUi(
              'pending',
              'No payment reference found. If you just paid, open Account — otherwise return to Pricing.'
            );
          }
          try {
            sessionStorage.removeItem('xf_pending_product');
            localStorage.removeItem('xf_pending_product');
          } catch (e3) {}
          if (paymentId) {
            ref.hidden = false;
            ref.textContent = 'Reference: ' + paymentId + (statusRaw ? ' · status: ' + statusRaw : '');
          }
        }

        /* Only verify/grant when status is success (or missing — then server decides) */
        var chain = Promise.resolve({ verifyOk: false });
        var mayVerify =
          paymentId &&
          !isFailedStatus(statusRaw) &&
          (isSuccessStatus(statusRaw) || !statusRaw);

        if (mayVerify && window.XFreezeAuth && window.XFreezeAuth.getSession) {
          var sess = window.XFreezeAuth.getSession();
          var token = sess && sess.access_token;
          if (token) {
            chain = fetch('/api/verify-payment', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: 'Bearer ' + token,
              },
              body: JSON.stringify({
                payment_id: paymentId,
                planId: planId || (product && product.id) || 'pro-monthly',
              }),
            })
              .then(function (r) {
                return r.json().then(function (v) {
                  return { ok: r.ok, v: v };
                });
              })
              .then(function (pair) {
                if (pair.ok && pair.v && pair.v.entitlement && window.XFreezeEntitlement) {
                  window.XFreezeEntitlement.applyServerEntitlement(pair.v.entitlement);
                }
                return {
                  verifyOk: Boolean(pair.ok && pair.v && pair.v.success && pair.v.granted),
                };
              })
              .catch(function () {
                return { verifyOk: false };
              });
          }
        }

        return chain
          .then(function (meta) {
            if (window.XFreezeEntitlement && window.XFreezeEntitlement.refresh) {
              return window.XFreezeEntitlement.refresh({ force: true }).then(function (snap) {
                return { snap: snap, verifyOk: meta.verifyOk };
              });
            }
            return { snap: { isPro: false }, verifyOk: meta.verifyOk };
          })
          .then(function (result) {
            finish(result.snap, result.verifyOk);
          });
      });
    })();
  </script>
</body>
</html>

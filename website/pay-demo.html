<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Favicon for browsers + Google Search (48px+ PNG required for SERP) -->
  <link rel="icon" href="/favicon.ico?v=share3" type="image/x-icon">
  <link rel="icon" href="/favicon.png?v=share3" type="image/png" sizes="48x48">
  <link rel="icon" href="/assets/images/logo/favicon-32.png?v=share3" type="image/png" sizes="32x32">
  <link rel="icon" href="/assets/images/logo/favicon-96.png?v=share3" type="image/png" sizes="96x96">
  <link rel="icon" href="/assets/images/logo/favicon-192.png?v=share3" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/assets/images/logo/apple-touch-icon.png?v=share3" sizes="180x180">
  <link rel="manifest" href="/site.webmanifest">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment demo - X Freeze</title>
  <script>
    (function () {
      var stored = localStorage.getItem('xfreeze-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.classList.toggle(
        'dark',
        stored === 'dark' || (stored !== 'light' && prefersDark)
      );
    })();
  </script>
  <link rel="stylesheet" href="css/site-fonts.css">
  <link rel="stylesheet" href="css/theme-dark.css">
  <link rel="stylesheet" href="css/checkout.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: var(--surface, #0a0a0a);
      color: var(--text, #f5f5f5);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      max-width: 28rem;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 1rem;
      padding: 1.75rem;
      background: rgba(255,255,255,0.04);
    }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; font-weight: 600; }
    p { margin: 0 0 1.25rem; font-size: 0.9rem; opacity: 0.7; line-height: 1.5; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 2.75rem;
      border: none;
      border-radius: 9999px;
      background: #fff;
      color: #0a0a0a;
      font-weight: 600;
      font-size: 0.9375rem;
      cursor: pointer;
      margin-bottom: 0.65rem;
    }
    .btn:hover { opacity: 0.92; }
    .btn-ghost {
      background: transparent;
      color: #f5f5f5;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .note { font-size: 0.75rem; opacity: 0.5; margin-top: 1rem; }
    a { color: inherit; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Razorpay test (USD)</h1>
    <p>
      International / USD checkout via Razorpay only.
      Requires <code>payment-server</code> on port 4242.
    </p>
    <button type="button" class="btn" id="pay-starter">Pay Starter Pack ($12 test)</button>
    <button type="button" class="btn btn-ghost" id="pay-custom">Pay $1 demo</button>
    <p class="note">
      Test card: <strong>4111 1111 1111 1111</strong> · any future expiry · any CVV<br>
      <a href="home">← Back home</a>
    </p>
  </div>

  <script src="data/products.js"></script>
  <script src="js/checkout.js"></script>
  <script>
    (function () {
      /* If payment server is not local, set:
         XFreezeCheckout.setApiBase('https://your-api.example.com'); */
      document.getElementById('pay-starter').addEventListener('click', function () {
        XFreezeCheckout.openBundle('starter');
      });
      document.getElementById('pay-custom').addEventListener('click', function () {
        XFreezeCheckout.openCustom('Demo payment', 1);
      });
    })();
  </script>
</body>
</html>
